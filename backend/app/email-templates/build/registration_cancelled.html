<!doctype html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"></head>
<body style="margin:0;padding:0;background:#fafbfc;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fafbfc;padding:24px 12px;">
    <tr><td align="center">
      <table width="600" style="max-width:600px;background:#fff;border-radius:8px;overflow:hidden;">
        <tr><td style="background:#64748b;padding:20px 24px;">
          <div style="color:#fff;font-size:18px;font-weight:600;">{{ project_name }}</div>
          <div style="color:#e2e8f0;font-size:13px;margin-top:4px;">Registration cancelled</div>
        </td></tr>
        <tr><td style="padding:24px;color:#334155;font-size:15px;line-height:1.5;">
          <p>Hi {{ attendee_name }},</p>
          <p>Your registration has been cancelled for <strong>{{ title }}</strong> on {{ start_label }}.</p>
          <p style="color:#64748b;font-size:14px;">If this was a mistake, contact the event organizer to register again.</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
