<!doctype html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#fafbfc;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#fafbfc;padding:24px 12px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.08);">
          <tr>
            <td style="background:#16a34a;padding:20px 24px;">
              <div style="color:#fff;font-size:18px;font-weight:600;">{{ project_name }}</div>
              <div style="color:#dcfce7;font-size:13px;margin-top:4px;">Booking approved</div>
            </td>
          </tr>
          <tr>
            <td style="padding:24px;color:#334155;font-size:15px;line-height:1.5;">
              <p style="margin:0 0 16px;">Your meeting room booking has been approved.</p>
              <table width="100%" cellpadding="0" cellspacing="0" style="background:#f0fdf4;border-radius:6px;">
                <tr><td style="padding:16px;">
                  <div style="font-size:17px;font-weight:600;color:#166534;">{{ title }}</div>
                  <div style="margin-top:8px;color:#57534E;">{{ room_name }}{% if area_name %} · {{ area_name }}{% endif %}</div>
                  <div style="margin-top:8px;color:#57534E;">{{ start_label }} – {{ end_label }}</div>
                </td></tr>
              </table>
              <p style="margin:24px 0 0;text-align:center;">
                <a href="{{ schedule_link }}" style="display:inline-block;background:#D97706;color:#fff;text-decoration:none;padding:12px 20px;border-radius:6px;font-weight:600;margin:4px;">View schedule</a>
                <a href="{{ my_bookings_link }}" style="display:inline-block;background:#fff;color:#D97706;text-decoration:none;padding:11px 20px;border-radius:6px;font-weight:600;border:1px solid #D97706;margin:4px;">My bookings</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
