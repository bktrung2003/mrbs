version: '3.8'

# Portainer stack â€” pull images from GHCR (built by GitHub Actions).
# Repo: https://github.com/bktrung2003/mrbs
#
# Portainer â†’ Stacks â†’ Git repository
#   Compose path: compose.portainer.yml
#   Env: copy portainer.env.example â†’ set DB_PASSWORD, SECRET_KEY, etc.

services:

  mrbs-frontend:
    image: ghcr.io/bktrung2003/mrbs-frontend:latest
    container_name: mrbs-frontend
    restart: unless-stopped
    ports:
      - "3014:80"
    depends_on:
      mrbs-backend:
        condition: service_healthy
    networks:
      - mrbs-network

  mrbs-backend:
    image: ghcr.io/bktrung2003/mrbs-backend:latest
    container_name: mrbs-backend
    hostname: mrbs-backend
    restart: unless-stopped
    ports:
      - "8014:8000"
    volumes:
      - mrbs_branding_data:/app/data/branding
    environment:
      - PROJECT_NAME=Fusion Hotel Group MRBS
      - ENVIRONMENT=production
      - TIMEZONE=Asia/Ho_Chi_Minh
      - BRANDING_UPLOAD_DIR=/app/data/branding
      - SECRET_KEY=${SECRET_KEY}
      - FIRST_SUPERUSER=admin@example.com
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - FRONTEND_HOST=${FRONTEND_URL}
      - BACKEND_CORS_ORIGINS=${FRONTEND_URL}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mrbs
      - POSTGRES_USER=mrbs_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    depends_on:
      postgres:
        condition: service_healthy
      mrbs-prestart:
        condition: service_completed_successfully
    networks:
      - mrbs-network

  mrbs-prestart:
    image: ghcr.io/bktrung2003/mrbs-backend:latest
    container_name: mrbs-prestart
    restart: "no"
    command: bash scripts/prestart.sh
    environment:
      - PROJECT_NAME=Fusion Hotel Group MRBS
      - ENVIRONMENT=production
      - TIMEZONE=Asia/Ho_Chi_Minh
      - SECRET_KEY=${SECRET_KEY}
      - FIRST_SUPERUSER=admin@example.com
      - FIRST_SUPERUSER_PASSWORD=${FIRST_SUPERUSER_PASSWORD}
      - FRONTEND_HOST=${FRONTEND_URL}
      - BACKEND_CORS_ORIGINS=${FRONTEND_URL}
      - POSTGRES_SERVER=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=mrbs
      - POSTGRES_USER=mrbs_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - EMAILS_FROM_EMAIL=${EMAILS_FROM_EMAIL:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - mrbs-network

  postgres:
    image: postgres:15-alpine
    container_name: mrbs-postgres
    restart: unless-stopped
    volumes:
      - mrbs_postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=mrbs
      - POSTGRES_USER=mrbs_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF8 --locale=C
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrbs_user -d mrbs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - mrbs-network

volumes:
  mrbs_postgres_data:
    driver: local
  mrbs_branding_data:
    driver: local

networks:
  mrbs-network:
    driver: bridge
